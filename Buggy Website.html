<!DOCTYPE html>
<html>
<head>
    <title>CS Club Demo Site</title>
    <link rel="stylesheet" href="style.css"> <!-- BUG: wrong filename -->
</head>

<body>

    <section id="hero">
        <h1>Welcome to the CS Club Website</h1>
        <nav>
            <ul>
                <li><a href="#Daniel">Meet Daniel</a>
                <li><a href="#about">About</a>
                <li><a href="#projects">Projects</a>
                <li><a href="#contact">Contact</a>
            </ul>
        </nav>
    </section>
    
    <section id="about">
        <div class="eyes">
            <div class="eye">
                <div class="ball"></div>
            </div>
            <div class="eye">
                <div class="ball"></div>
            </div>
    
    <script>
    var balls=document.getElementsByClassName("ball");
    document.onmousemove=function(){
        var x=event.clientX *100/window.innerWidth + "%"
        var y=event.clientY *100/window.innerHeight + "%"

        for(var i=0;i<2;i++){
            balls[i].style.left=x;
            balls[i].style.top=y;
            balls[i].style.transform="translate(-"+x+",-"+y+")"
        }
    }
</script>
    </section>
    
    <section id="about">
        <h2>About Us</h2>
        <p>We love programming and building cool stuff.</p>
    </section> <!-- BUG: unclosed <p> -->

    <section id="projects">
        <h2>Projects</h2>
        <button onclick="showProjects()">Show Projects</button>
        <ul id="project-list">
            <li>Website Builder
            <li>Game Engine
            <li>Robot Controller
        </ul>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <form>
            <input type="text" placeholder="Your name">
            <input type="email" placeholder="Your email">
            <button>Submit</button>
        </form>
    </section>

    <script src="script.js"></script>

</body>
</html>
